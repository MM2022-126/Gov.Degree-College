services:
  - type: web
    name: scholarshine-connect-backend
    env: node
    plan: free
    region: oregon
    buildCommand: "NODE_ENV=development npm ci && npm run build"
    startCommand: "npm run start"
    nodeVersion: 18
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        value: https://your-vercel-frontend-url.vercel.app
